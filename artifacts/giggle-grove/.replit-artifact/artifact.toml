kind = "web"
previewPath = "/"
title = "Giggle Grove"
version = "1.0.0"
id = "artifacts/giggle-grove"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20337

[services.development]
run = "pnpm --filter @workspace/giggle-grove run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/giggle-grove", "run", "build" ]
publicDir = "artifacts/giggle-grove/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20337"
BASE_PATH = "/"
